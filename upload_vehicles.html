<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Vehicle | FarmGlobe</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1f7a4d',
            secondary: '#2ea36b',
            accent: '#f97316',
            light: '#f6f3ec'
          }
        }
      }
    }
  </script>
</head>
<body class="bg-light text-gray-800">

<!-- ================= NAVBAR ================= -->
<header class="bg-white shadow-md sticky top-0 z-30 w-full transition-all duration-300">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-20">
            <div class="flex items-center gap-4">
                <a href="homepage.html" class="flex items-center gap-2 group">
                    <div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center text-white font-bold text-lg shadow-sm group-hover:bg-secondary transition-colors">FG</div>
                    <span class="font-bold text-2xl text-primary tracking-tight group-hover:text-secondary transition-colors">FarmGlobe</span>
                </a>
            </div>
            <div class="flex items-center gap-4">
                 <div class="hidden lg:flex items-center gap-6 mr-2">
                    <a href="logistics_dashboard.html" class="text-gray-600 hover:text-primary font-medium text-sm transition-colors">Back</a>
                    <a href="homepage.html" class="text-gray-600 hover:text-primary font-bold text-sm transition-colors">Home</a>
                </div>
                <div class="flex items-center gap-2 pl-2 border-l border-gray-200">
                     <a href="logout.php" class="px-5 py-2.5 bg-gray-100 text-gray-700 rounded-xl text-sm font-bold shadow hover:bg-gray-200 transition-all">Logout</a>
                </div>
            </div>
        </div>
    </div>
</header>

<div class="flex min-h-screen">
  <!-- ========== SIDEBAR ========== -->
  <aside class="hidden lg:block w-64 bg-primary text-white p-6">
    <h3 class="font-semibold mb-6 text-green-100 uppercase text-xs tracking-wider">Logistics Menu</h3>
    <ul class="space-y-4">
      <li class="hover:text-gray-200 cursor-pointer"><a href="homepage.html">Home</a></li>
      <li class="hover:text-gray-200 cursor-pointer"><a href="logistics_dashboard.html">Dashboard</a></li>
      <li class="text-white font-bold cursor-pointer">Upload Vehicle</li>
    </ul>
  </aside>

  <!-- ========== MAIN CONTENT ========== -->
  <main class="flex-1 p-6 md:p-10">
    <div class="max-w-3xl mx-auto">
        <h1 class="text-2xl font-bold text-primary mb-8">Vehicle Registration</h1>

        <form id="vehicleForm" class="bg-white rounded-xl shadow-lg p-8 space-y-8" enctype="multipart/form-data">
            
            <!-- Image Upload Section -->
            <div class="flex flex-col gap-2">
                <label class="font-bold text-gray-700">Vehicle Photo (Optional)</label>
                <p class="text-xs text-accent font-medium">Tip: Uploading a clear photo of your vehicle increases your visibility to potential clients.</p>
                <label class="border-2 border-dashed border-gray-300 rounded-xl p-8 flex flex-col items-center justify-center bg-gray-50 hover:bg-gray-100 transition cursor-pointer group">
                    <div class="w-12 h-12 bg-green-100 text-primary rounded-full flex items-center justify-center mb-3 group-hover:scale-110 transition">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
                        </svg>
                    </div>
                    <span class="text-sm text-gray-500 font-medium">Click to upload vehicle photo</span>
                    <input type="file" class="hidden" name="vehicle_image" accept="image/*">
                </label>
            </div>


            <!-- Vehicle Details Row -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="flex flex-col gap-2">
                    <label class="font-bold text-gray-700">Vehicle Type</label>
                    <select name="vehicle_type" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-primary bg-gray-50">
                        <option value="">Select Type</option>
                        <option value="Truck">Truck</option>
                        <option value="Van">Van</option>
                        <option value="Motorcycle">Motorcycle</option>
                        <option value="Pickup">Pickup</option>
                    </select>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="font-bold text-gray-700">Vehicle Capacity</label>
                    <div class="relative">
                        <input type="number" name="vehicle_capacity" required placeholder="e.g. 5000" 
                               class="w-full pl-4 pr-12 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-primary bg-gray-50">
                        <span class="absolute right-4 top-3 text-gray-400 text-sm font-bold">KG</span>
                    </div>
                </div>
            </div>

            <!-- Location Details Row -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="flex flex-col gap-2">
                    <label class="font-bold text-gray-700">Region</label>
                    <input type="text" name="region" required placeholder="e.g. Littoral" 
                           class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-primary bg-gray-50">
                </div>

                <div class="flex flex-col gap-2">
                    <label class="font-bold text-gray-700">Subdivision</label>
                    <input type="text" name="subdivision" required placeholder="e.g. Douala I" 
                           class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-primary bg-gray-50">
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-primary text-white font-bold text-lg py-4 rounded-xl hover:bg-secondary transition shadow-md">
                Register Vehicle
            </button>
        </form>
    </div>
  </main>
</div>

<script>
document.getElementById('vehicleForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Processing...';
    
    const formData = new FormData(this);
    
    fetch('uploadvehicle.php', {
        method: 'POST',
        body: formData
    })
    .then(async response => {
        const text = await response.text();
        try {
            return JSON.parse(text);
        } catch (err) {
            console.error('Server responded with non-JSON:', text);
            throw new Error('Server side error: ' + text);
        }
    })
    .then(data => {
        if (data.success) {
            alert('Vehicle details uploaded successfully!');
            window.location.href = 'logistics_dashboard.html';
        } else {
            alert('Error: ' + ( data.errors.join('\n') ));
            const errorMsg = Array.isArray(data.errors) ? data.errors.join('\n') : (data.errors || 'Unknown error occurred');
            alert('Error: ' + errorMsg);
            btn.disabled = false;
            btn.textContent = 'Register Vehicle';
        }
    })
    .catch(error => {
        console.error('Error:', error);
        btn.disabled = false;
        btn.textContent = 'Register Vehicle';
    });
});

// Quick auth check
fetch('fetchUser.php')
    .then(res => res.json())
    .then(data => {
        const allowedRoles = ['logistic_operator', 'logistic operator', 'logistics agent', 'logistics provider'];
        if (!data.role || !allowedRoles.includes(data.role.toLowerCase())) {
            alert("Access Denied: Only Logistics Providers can access this page.");
            window.location.href = 'homepage.html';
        }
    })
    .catch(err => console.error(err));
</script>
</body>
</html>
