<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Transport | FarmGlobe</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { primary: '#1f7a4d', secondary: '#2ea36b', light: '#f6f3ec' } } }
    }
  </script>
</head>
<body class="bg-light min-h-screen flex items-center justify-center py-10 px-4">
  <div class="bg-white shadow-xl rounded-2xl w-full max-w-md p-8">
    <div class="text-center mb-8">
        <div class="w-12 h-12 bg-primary rounded-lg mx-auto mb-4 flex items-center justify-center text-white font-bold text-xl">FG</div>
        <h1 class="text-2xl font-bold text-primary">Finalize Booking</h1>
        <p class="text-gray-500 text-sm">Provide logistics details for your shipment</p>
    </div>

    <form id="bookingForm" class="space-y-5">
        <!-- Hidden fields from URL -->
        <input type="hidden" name="order_id" id="order_id">
        <input type="hidden" name="provider_id" id="provider_id">

        <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">Pickup Location</label>
            <input type="text" name="pickup_location" placeholder="e.g. Ndop Central Market" required 
                   class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-primary outline-none bg-gray-50">
        </div>

        <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">Delivery Destination</label>
            <input type="text" name="delivery_location" placeholder="e.g. Douala Port Warehouse" required 
                   class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-primary outline-none bg-gray-50">
        </div>

        <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">Expected Delivery Date</label>
            <input type="date" name="delivery_date" required 
                   class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-primary outline-none bg-gray-50">
        </div>

        <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">Meetup & Pickup Instructions</label>
            <textarea name="meetup_directions" rows="4" placeholder="Describe the specific direction for the agent to find the goods..." 
                      class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-primary outline-none bg-gray-50"></textarea>
        </div>

        <div class="pt-2">
            <button type="submit" id="submitBtn" class="w-full bg-primary text-white py-4 rounded-xl font-bold hover:bg-secondary transition shadow-lg">
                Confirm Shipment Request
            </button>
            <button type="button" onclick="history.back()" class="w-full mt-3 text-gray-500 text-sm font-medium hover:underline">
                Cancel
            </button>
        </div>
    </form>
  </div>

  <script>
    // Get IDs from URL
    const urlParams = new URLSearchParams(window.location.search);
    document.getElementById('order_id').value = urlParams.get('order_id');
    document.getElementById('provider_id').value = urlParams.get('provider_id');
console.log('Order ID:', urlParams.get('order_id'), 'Provider ID:', urlParams.get('provider_id'));
    document.getElementById('bookingForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.textContent = 'Submitting Request...';

        const formData = new FormData(this);

        fetch('submit_shipment.php', {
            method: 'POST',
            credentials:"same-origin",
            body: formData
        })
        .then(res => res.json())
        .then(data => {
            if(data.success) {
                alert('Shipment request submitted! The provider has been notified.');
                window.location.href = 'homepage.html';
            } else {
                alert('Error: ' + data.errors.join('\n'));
                btn.disabled = false;
                btn.textContent = 'Confirm Shipment Request';
            }
        })
        .catch(err => {
            console.error(err);
            btn.disabled = false;
            btn.textContent = 'Confirm Shipment Request';
        });
    });

    // Simple session check
    fetch('fetchUser.php')
    .then(r => r.json())
    .then(data => {
        if(!data.user_id) {
            alert("Please login to book transport.");
            window.location.href = 'login.html';
        }
    });
  </script>
</body>
</html>
