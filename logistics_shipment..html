<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistics Dashboard - FarmGlobe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
          theme: { extend: { colors: { primary: '#1f7a4d', secondary: '#2ea36b', accent: '#f97316', light: '#f6f3ec' } } }
        }
    </script>
</head>
<body class="bg-light min-h-screen p-6">
    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-bold text-primary">Logistics Dashboard</h1>
            <a href="homepage.html" class="text-sm font-bold text-gray-500 hover:text-primary">← Marketplace</a>
        </header>

        <section>
            <h2 class="text-xl font-bold text-gray-700 mb-6">Transport Requests</h2>
            <div id="shipmentsGrid" class="grid gap-6">
                <p class="text-gray-500 italic">Loading shipments...</p>
            </div>
        </section>
    </div>

    <script>
          function fetchShipments() {
            fetch('get_logistics_shipments.php')
                .then(res => res.json())
                .then(data => {
                    const grid = document.getElementById('shipmentsGrid');
                    if (data.success && data.shipments.length > 0) {
                      console.log("Fetched Shipments:", data.shipments); // Debug log
                        grid.innerHTML = data.shipments.map(s => {
                            const isPending = s.delivery_status === 'pending';
                            console.log("Shipment ID:", s.shipment_id, "Status:", s.delivery_status); // Debug log  
                            return `
                                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                                    <div class="flex-grow">
                                        <div class="flex items-center gap-3 mb-2">
                                            <span class="bg-blue-100 text-blue-700 text-[10px] font-bold px-2 py-1 rounded-full uppercase">Order #${s.order_id}</span>
                                            <span class="text-xs font-bold ${s.delivery_status === 'Pending' ? 'text-orange-500' : 'text-primary'} uppercase tracking-wider">${s.delivery_status}</span>
                                        </div>
                                        <h3 class="font-bold text-lg text-gray-800 mb-1">${s.product_name} (${s.quantity} ${s.unit})</h3>
                                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-x-8 gap-y-2 text-sm text-gray-500">
                                            <p><strong>Pickup:</strong> ${s.pickup_location}</p>
                                            <p><strong>Delivery:</strong> ${s.delivery_location}</p>
                                            <p><strong>Date:</strong> ${new Date(s.delivery_date).toLocaleDateString()}</p>
                                            <p class="col-span-full italic bg-gray-50 p-2 rounded mt-2"><strong>Notes:</strong> ${s.meetup_directions || 'No instructions provided'}</p>
                                        </div>
                                    </div>

                                    <div class="flex flex-col gap-2 w-full md:w-auto">
                                        ${isPending ? `
                                            <button id="acceptBtn_${s.shipment_id}" onclick="updateStatus(${s.shipment_id}, 'In Transit', this)" class="bg-agri-gold text-white px-6 py-3 rounded-xl font-bold hover:opacity-90 transition shadow-md">
                                                Accept Shipment
                                            </button>
                                            <button id="rejectBtn_${s.shipment_id}" onclick="updateStatus(${s.shipment_id}, 'Rejected', this)" class="border-2 border-red-500 text-red-500 px-6 py-3 rounded-xl font-bold hover:bg-red-50 transition">
                                                Reject
                                            </button>
                                        ` : `
                                            <button class="bg-gray-100 text-gray-400 px-6 py-3 rounded-xl font-bold cursor-default" disabled>
                                                Shipment Processed
                                            </button>
                                        `}
                                    </div>
                                </div>
                            `;
                        }).join('');
                    } else {
                        grid.innerHTML = '<div class="bg-white p-10 text-center rounded-2xl border-2 border-dashed border-gray-200 text-gray-400 italic">No shipment requests assigned to you yet.</div>';
                    }
                });
        }

        fetchShipments()
        function updateStatus(shipmentId, newStatus, btnElement) {
            if (newStatus === 'Rejected' && !confirm('Are you sure you want to reject this transport request?')) return;

            const originalText = btnElement.textContent;
            btnElement.disabled = true;
            btnElement.textContent = 'Processing...';

            fetch('update_shipment_status.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ shipment_id: shipmentId, status: newStatus })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        alert(newStatus === 'In Transit' ? 'Request Accepted! Check pickup details.' : 'Request Rejected.');
                        fetchShipments();
                    } else {
                        alert('Error: ' + (data.errors ? data.errors.join(', ') : 'Unknown error'));
                        btnElement.disabled = false;
                        btnElement.textContent = originalText;
                    }
                })
                .catch(err => {
                    console.error(err);
                    btnElement.disabled = false;
                    btnElement.textContent = originalText;
                });
        }

        // Function to handle Accept Shipment from Notification (This function is not used in the current HTML, but kept for completeness if notifications link to it)
        window.acceptShipment = function (orderId, btnElement) {
            if (!confirm("Do you want to accept this shipment job?")) return;

            fetch('accept_shipment.php', { // Assuming you have an accept_shipment.php
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ order_id: orderId })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.success) { alert("Shipment Assigned to you!"); btnElement.disabled = true; btnElement.textContent = "Accepted"; }
                    else { alert("Error: " + (data.errors ? data.errors.join(', ') : 'Unknown')); }
                })
                .catch(err => console.error(err));
        };
    
        // / Security check
        fetch('fetchUser.php')
            .then(res => res.json())
            .then(data => {
                if (!data.user_id || (data.role.toLowerCase() !== 'logistics provider' && data.role.toLowerCase() !== 'logistic operator')) {
                    alert("Access denied. Logistics providers only.");
                    window.location.href = 'homepage.html';
                } else {
                    fetchShipments();
                }
            });
    </script>
</body>
</html>
