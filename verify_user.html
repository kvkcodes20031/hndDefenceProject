<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Review User Document | FarmGlobe Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { primary: '#1f7a4d', secondary: '#2ea36b', light: '#f6f3ec' } } } }
  </script>
</head>
<body class="bg-light min-h-screen p-6">
  <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden">
    <div class="p-6 border-b flex justify-between items-center">
        <h1 class="text-2xl font-bold text-primary">Verification Document Review</h1>
        <a href="users.html" class="text-sm font-bold text-gray-500 hover:underline">← Back to List</a>
    </div>
    <div class="p-8">
        <div id="userInfo" class="mb-6">
            <p class="text-gray-400">Loading user information...</p>
        </div>
        <div id="documentContainer" class="border rounded-lg bg-gray-50 flex items-center justify-center min-h-[500px]">
            <p class="text-gray-400">Loading document...</p>
        </div>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('user_id');

    if (!userId) {
        alert("No user specified.");
        window.location.href = 'users.html';
    } else {
        fetch(`get_user_document.php?user_id=${userId}`)
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                document.getElementById('userInfo').innerHTML = `
                    <h2 class="text-xl font-bold">${data.user.first_name} ${data.user.last_name}</h2>
                    <p class="text-sm text-gray-600 mb-2">${data.user.email} | Role: <span class="capitalize">${data.user.role}</span></p>
                    <span class="bg-primary/10 text-primary px-3 py-1 rounded-full text-xs font-bold">Document Type: ${data.user.id_type || 'Unknown'}</span>
                `;

                const docPath = data.user.id_document;
                const container = document.getElementById('documentContainer');
                
                if (docPath.toLowerCase().endsWith('.pdf')) {
                    container.innerHTML = `<embed src="${docPath}" type="application/pdf" width="100%" height="600px" />`;
                } else {
                    container.innerHTML = `<img src="${docPath}" alt="ID Document" class="max-w-full h-auto rounded shadow-lg" />`;
                }
            } else {
                document.getElementById('documentContainer').innerHTML = `<p class="text-red-500">${data.errors.join(', ')}</p>`;
            }
        })
        .catch(err => {
            console.error(err);
            document.getElementById('documentContainer').innerHTML = `<p class="text-red-500">Failed to load document.</p>`;
        });
    }
  </script>
</body>
</html>
