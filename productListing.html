<script>
// Check if user is a Farmer
fetch('fetchUser.php')
    .then(response => response.json())
    .then(data => {
        if (!data.role || data.role.toLowerCase() !== 'farmer') {
            alert("Access Denied: Only users registered as a 'Farmer' can list produce.");
            // window.location.href = 'homepage.html';
            console.warn('Unauthorized access attempt to product listing page by user with role:', data.role);
        }

        
    })
    .catch(error => {
        console.error('Auth check error:', error);
        
    });

// Fetch product definitions for the dropdown
fetch('get_products.php')
    .then(response => response.json())
    .then(data => {
        const select = document.getElementById('productSelect');
        if (data.success && data.products.length > 0) {
            select.innerHTML = '<option value="">Select a Product</option>';
            data.products.forEach(p => {
                const option = document.createElement('option');
                option.value = p.product_id;
                option.setAttribute('data-product-name', p.product_name);
                const name = p.product_name || p.name;
                option.textContent = `${name} (${p.category} - ${p.unit})`;
                    select.appendChild(option);
            });
        } else {
            select.innerHTML = '<option value="">No products defined</option>';
        }
    })
    .catch(err => {
        console.error(err);
        document.getElementById('productSelect').innerHTML = '<option value="">Error loading products</option>';
    });

document.getElementById('productForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const formData = new FormData(this);
    
    fetch('productListing.php', {
        method: 'POST',
        body: formData
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            alert('Product listed successfully!');
            window.location.href = 'homepage.html';
        } else {
            alert('Error: ' + data.errors.join('\n'));
        }
    })
    .catch(error => console.error('Error:', error));
});
</script>
