<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | AgriLink</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Theme config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1f7a4d',
            secondary: '#2ea36b',
            light: '#f6f3ec'
          }
        }
      }
    }
  </script>
</head>

<body class="bg-light min-h-screen flex items-center justify-center">

  <!-- LOGIN CARD -->
  <div class="bg-white shadow-lg rounded-lg w-full max-w-md p-8">

    <!-- Logo -->
    <div class="text-center mb-6">
      <div class="w-12 h-12 bg-primary rounded mx-auto mb-2"></div>
      <h1 class="text-2xl font-bold text-primary">AgriLink</h1>
      <p class="text-gray-500 text-sm">
        Login to your account
      </p>
    </div>

    <!-- FORM -->
    <form id="loginForm" class="space-y-5">

      <!-- Phone or Email -->
      <div>
        <label class="block text-sm font-medium mb-1">
          Phone Number or Email
        </label>
        <input
          type="text"
          name="login_identifier"
          placeholder="e.g. 677123456 or user@email.com"
          required
          class="w-full px-4 py-3 border rounded focus:outline-none focus:ring-2 focus:ring-primary"
        />
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm font-medium mb-1">
          Password
        </label>
        <input
          type="password"
          name="loginPassword"
          placeholder="Enter your password"
          required
          class="w-full px-4 py-3 border rounded focus:outline-none focus:ring-2 focus:ring-primary"
        />
      </div>

      <!-- Remember + Forgot -->
      <div class="flex items-center justify-between text-sm">
        <label class="flex items-center gap-2">
          <input type="checkbox" class="accent-primary">
          Remember me
        </label>
        <a href="#" class="text-primary hover:underline">
          Forgot password?
        </a>
      </div>

      <!-- Login Button -->
      <button
        type="submit"
        class="w-full bg-primary text-white py-3 rounded hover:bg-secondary transition"
      >
        Login
      </button>
    </form>

    <!-- Register -->
    <p class="text-center text-sm mt-6">
      Don’t have an account?
      <a href="Registration.html" class="text-primary font-medium hover:underline">
        Create one
      </a>
    </p>

  </div>

</body>
</html>


  
    <script src="login.js"></script>


</body>
</html>
