<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Logistics - FarmGlobe</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-xl shadow-lg max-w-md w-full text-center">
        <h1 class="text-2xl font-bold text-green-700 mb-4">Request Logistics</h1>
        <p class="text-gray-600 mb-8">Order confirmed. Click below to broadcast a pickup request to all active logistics providers nearby.</p>
        
        <button id="broadcastBtn" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold hover:bg-green-700 transition">
            Broadcast Request to Logistics
        </button>
        
        <a href="farmerdashboard.html" class="block mt-4 text-sm text-gray-500 hover:underline">Back to Dashboard</a>
        <div id="statusMsg" class="mt-4 text-sm font-medium"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('order_id');

        document.getElementById('broadcastBtn').addEventListener('click', function() {
            if(!orderId) { alert("Invalid Order ID"); return; }
            
            const btn = this;
            btn.disabled = true;
            btn.textContent = "Broadcasting...";

            fetch('broadcast_logistics.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ order_id: orderId })
            })
            .then(res => res.json())
            .then(data => {
                const msg = document.getElementById('statusMsg');
                if(data.success) {
                    msg.textContent = "Request sent! Logistics providers have been notified.";
                    msg.className = "mt-4 text-sm font-medium text-green-600";
                    setTimeout(() => window.location.href = 'farmerdashboard.html', 3000);
                } else {
                    msg.textContent = "Error: " + (data.errors ? data.errors.join(', ') : 'Unknown');
                    msg.className = "mt-4 text-sm font-medium text-red-600";
                    btn.disabled = false;
                    btn.textContent = "Broadcast Request to Logistics";
                }
            })
            .catch(err => {
                console.error(err);
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
