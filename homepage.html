<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home | FarmGlobe</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1f7a4d',
            secondary: '#2ea36b',
            accent: '#f97316',
            light: '#f6f3ec'
          }
        }
      }
    }
  </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FDFBF7; }
        .bg-agri-green { background-color: #064E3B; }
        .text-agri-green { color: #064E3B; }
        .bg-agri-orange { background-color: #E67E22; }
        .border-agri-green { border-color: #064E3B; }
    </style>

</head>
<body class="bg-light text-gray-800">

<!-- ================= NAVBAR ================= -->
<header class="bg-white shadow-sm sticky top-0 z-30">
  <div class="mx-auto px-4 py-4 flex justify-between items-center">
    <div class="flex items-center gap-2">
      <button id="sidebarToggle" class="lg:hidden text-2xl mr-2">☰</button>
      <div class="w-8 h-8 bg-primary rounded">FG</div>
      <span class="font-bold text-xl text-primary">FarmGlobe</span>
    </div>
    <div class="flex gap-3 items-center">
      <a href="#" class="text-gray-600 hover:text-primary font-medium" id="dashboards">Dashboard</a>
      <a href="homepage.html" class="mx-4 text-primary font-medium">Home</a>
      <button id="cartToggleBtn" class="flex items-center gap-1 text-gray-600 hover:text-primary font-medium">
        <span>🛒</span>
        <span>Cart (<span id="cartCount">0</span>)</span>
      </button>
      <a href="login.html" class="px-4 py-2 border border-primary text-primary rounded">Login</a>
    </div>
  </div>
  <!-- Filter Bar -->
  <div class="bg-white p-4 rounded shadow flex flex-col md:flex-row gap-4 items-center border-t">
    <input type="text" placeholder="Search products..." class="border p-2 rounded w-full md:w-1/3 focus:outline-none focus:ring-2 focus:ring-primary">

    <select class="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-primary w-full md:w-auto">
        <option>All Categories</option>
        <option>Vegetables</option>
        <option>Fruits</option>
        <option>Grains</option>
        <option>Tubers</option>
    </select>

    <select class="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-primary w-full md:w-auto">
        <option>All Locations</option>
        <option>Douala</option>
        <option>Yaoundé</option>
        <option>Bamenda</option>
    </select>

    <button class="bg-primary text-white px-4 py-2 rounded mt-2 md:mt-0 hover:bg-secondary transition w-full md:w-auto">
        Filter
    </button>
  </div>
</header>

<!-- Sidebar Overlay -->
<div id="sidebarOverlay" class="fixed inset-0 bg-black/50 z-40 hidden"></div>

<div class="flex min-h-screen">

  <!-- ========== SIDEBAR ========== -->
  <aside id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-primary text-white p-6 transform -translate-x-full transition-transform duration-300 ease-in-out z-50 lg:sticky lg:top-[148px] lg:translate-x-0 lg:h-[calc(100vh-148px)] self-start">
    <div class="flex items-center justify-between mb-8">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 bg-white rounded flex items-center justify-center text-primary font-bold italic">FG</div>
        <span class="font-bold text-xl">FarmGlobe</span>
        
      </div>
      <button id="sidebarClose" class="lg:hidden text-2xl">&times;</button>
    </div>
    <h3 class="font-semibold mb-6 text-green-100 uppercase text-xs tracking-wider">Menu</h3>
    <ul class="space-y-4">
      <li class="text-white font-bold cursor-pointer"><a href="homepage.html">Home</a></li>
      <li class="hover:text-gray-200 cursor-pointer"><a href="#" id="sidebarDashboardLink">Dashboard</a></li>
      <li class="hover:text-gray-200 cursor-pointer">My Produce</li>
      <li class="hover:text-gray-200 cursor-pointer">Orders</li>
      <li class="hover:text-gray-200 cursor-pointer">Logistics</li>
      <li class="hover:text-gray-200 cursor-pointer">Supplier</li>
      <li class="mt-6">
        <a href="productListing.html" class="block w-full bg-accent text-white text-center py-2 rounded font-bold shadow-md" id="productlisting">
            + List Product
        </a>
      </li>
    </ul>
  </aside>

  <!-- ========== MAIN CONTENT ========== -->
  <main class="flex-1 p-6 md:p-10">
    <div class=" mx-auto max-w-7xl">
        <div class="flex items-center justify-between mb-8">
            <h1 class="text-2xl font-bold text-primary">Fresh Produce</h1>
        </div>

        <!-- PRODUCTS GRID -->
        <div id="productsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Loading State -->
            <p class="text-gray-500">Loading products...</p>
        </div>
    </div>
  </main>
</div>

<!-- Cart Sidebar -->
<div id="cartOverlay" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden transition-opacity"></div>
<div id="cartSidebar" class="fixed inset-y-0 right-0 w-full md:w-96 bg-white shadow-2xl transform translate-x-full transition-transform duration-300 ease-in-out z-50 flex flex-col">
    <div class="p-4 border-b flex justify-between items-center bg-primary text-white">
        <h2 class="font-bold text-lg">Your Cart</h2>
        <button id="closeCartBtn" class="text-white hover:text-gray-200 text-xl font-bold">✕</button>
    </div>
    
    <div id="cartItemsContainer" class="flex-1 overflow-y-auto p-4 space-y-4">
        <p class="text-gray-500 text-center mt-10">Your cart is empty.</p>
    </div>

    <div class="p-4 border-t bg-gray-50">
        <div class="flex justify-between font-bold text-lg mb-4">
            <span>Total:</span>
            <span id="cartTotalDisplay">0 XAF</span>
        </div>
        <button onclick="checkout()" class="w-full bg-primary text-white py-3 rounded-xl font-bold hover:bg-opacity-90 transition shadow-md">Checkout</button>
    </div>
</div>

<script>
    // Sidebar toggle
    const sidebar = document.getElementById('sidebar');
    const sidebarToggle = document.getElementById('sidebarToggle');
    const sidebarClose = document.getElementById('sidebarClose');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    const toggleFunc = () => {
        sidebar.classList.toggle('-translate-x-full');
        sidebarOverlay.classList.toggle('hidden');
    };
    sidebarToggle.addEventListener('click', toggleFunc);
    sidebarClose.addEventListener('click', toggleFunc);
    sidebarOverlay.addEventListener('click', toggleFunc);

    // Fetch and display products
    fetch('get_product_listing.php')
    .then(response => response.json())
    .then(data => {
        const grid = document.getElementById('productsGrid');
        if (data.success && data.products.length > 0) {
            grid.innerHTML = data.products.map(product => `
                <div class="bg-white rounded shadow p-4 flex flex-col">
                    <div class="h-40 bg-gray-200 flex items-center justify-center mb-4 overflow-hidden rounded">
                        ${product.image_path 
                            ? `<img src="${product.image_path}" alt="${product.product_name}" class="w-full h-full object-cover">`
                            : `<span class="text-4xl">🖼️</span>`
                        }
                    </div>
                    <span class="text-xs bg-green-200 text-green-800 px-2 py-1 rounded-full mb-2 w-max">${product.category || 'Produce'}</span>
                    <h3 class="font-semibold">${product.product_name || 'Unknown Product'}</h3>
                    <p class="text-sm text-gray-500">Farmer: ${product.farm_name || 'Unknown'}</p>
                    <p class="text-green-600 font-bold">${product.price_per_unit} XAF per ${product.unit}</p>
                    <div class="mt-3 flex gap-2">
                        <button class="flex-1 bg-gray-100 text-gray-700 py-3 rounded-xl font-bold text-xs hover:bg-gray-200 transition">
                            View Details
                        </button>
                        <button 
                            onclick="addToCart(this)"
                            data-name="${(product.product_name || 'Unknown').replace(/"/g, '&quot;')}"
                            data-price="${product.price_per_unit || 0}"
                            data-unit="${product.unit || ''}"
                            data-id="${product.listing_id}"
                            class="flex-1 bg-agri-green text-white py-3 rounded-xl font-bold text-xs hover:bg-opacity-90 transition shadow-md">
                            Add to Cart
                        </button>
                    </div>
                </div>
            `).join('');


            console.log('Products loaded:', data.products.length);
        } else {
            grid.innerHTML = '<p class="text-gray-500 col-span-3 text-center">No products found.</p>';
            if (!data.success) {
                console.error('Server reported error:', data.errors);
            }
        }
    })
    .catch(error => console.error('Error loading products:', error));

    // Cart Logic
    let cart = JSON.parse(localStorage.getItem('agriLinkCart')) || [];
    const cartSidebar = document.getElementById('cartSidebar');
    const cartOverlay = document.getElementById('cartOverlay');
    const cartCountSpan = document.getElementById('cartCount');
    const cartItemsContainer = document.getElementById('cartItemsContainer');
    const cartTotalDisplay = document.getElementById('cartTotalDisplay');

    // Toggle Cart
    function toggleCart() {
        const isClosed = cartSidebar.classList.contains('translate-x-full');
        if (isClosed) {
            cartSidebar.classList.remove('translate-x-full');
            cartOverlay.classList.remove('hidden');
        } else {
            cartSidebar.classList.add('translate-x-full');
            cartOverlay.classList.add('hidden');
        }
    }

    document.getElementById('cartToggleBtn').addEventListener('click', toggleCart);
    document.getElementById('closeCartBtn').addEventListener('click', toggleCart);
    cartOverlay.addEventListener('click', toggleCart);

    // Add to Cart Function
    function addToCart(btn) {
        const name = btn.getAttribute('data-name');
        const price = parseFloat(btn.getAttribute('data-price'));
        const unit = btn.getAttribute('data-unit');
        const productId = btn.getAttribute('data-id');

        // Check if item exists
        const existingItem = cart.find(item => item.name === name);
        if (existingItem) {
            existingItem.quantity += 1;
        } else {
            cart.push({ name, price, unit, quantity: 1, id: productId });
        }

        updateCartUI();
        
        // Open cart to show feedback
        if (cartSidebar.classList.contains('translate-x-full')) {
            // toggleCart();
        }

        // Submit cart data to database
        const formData = new FormData();
        formData.append('status', 'Active');
        fetch('submit_cart_data.php', {
            method: 'POST',
            credentials: 'same-origin',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if (data.success && data.cart_id) {
                console.log('Cart synced:', data);

                // Submit item data now that we have cart_id
               const itemData = new FormData();
                itemData.append('cart_id', data.cart_id);
                itemData.append('product_id', productId);
                itemData.append('quantity', 1); // Add 1 item
                itemData.append('price_at_time', price);
                console.log("Product ID being sent:", productId);
                console.log("Cart ID being sent:", data.cart_id);
                
                fetch('submit_cart_item_data.php', {
                    method: 'POST',
                    credentials: 'same-origin',
                    body: itemData
                })
                .then(r => r.text())
                .then(text => {

                    
                    console.log('Raw Server Response:', text); // Debugging: See exact output
                    try {
                        const d = JSON.parse(text);
                        if (!d.success) console.error('Item sync server error:', d.errors || d);
                        else console.log('Item synced:', d);
                    } catch (e) {
                        console.error('JSON Parse Error. Server sent:', text);
                    }
                })
                .catch(e => console.error('Item sync error:', e));
            } else 
                console.error('Cart sync server error:', data.errors || data);
        
        })
        .catch(error => console.error('Error syncing cart:', error));
    }

    // Checkout Function
  function checkout() {
    if (cart.length === 0) {
        alert("Your cart is empty.");
        return;
    }

    const totalAmount = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

    const orderData = {
        total_amount: totalAmount,
        order_status: "Pending",
        items: cart
    };

    fetch('submit_order_data.php', {
        method: 'POST',
        credentials: 'same-origin',
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(orderData)
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            alert("Order placed successfully!");

            cart = [];
            localStorage.removeItem("agriLinkCart");
         

            updateCartUI();
            toggleCart();
        } else {
            alert("Checkout failed: " + data.errors.join(", "));
        }
    })
    .catch(err => console.error("Checkout error:", err));
}

    // Remove from Cart Function
    function removeFromCart(index) {
        cart.splice(index, 1);
        updateCartUI();
    }

    // Update Cart UI Function
    function updateCartUI() {
        localStorage.setItem('agriLinkCart', JSON.stringify(cart));
        cartCountSpan.textContent = cart.reduce((sum, item) => sum + item.quantity, 0);
        
        let total = 0;
        cartItemsContainer.innerHTML = cart.map((item, index) => {
            const itemTotal = item.price * item.quantity;
            total += itemTotal;
            return `
                <div class="flex justify-between items-center border-b pb-2">
                    <div>
                        <h4 class="font-bold text-sm">${item.name}</h4>
                        <p class="text-xs text-gray-500">${item.quantity} x ${item.price} XAF / ${item.unit}</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="font-bold text-primary">${itemTotal.toLocaleString()} XAF</span>
                        <button onclick="removeFromCart(${index})" class="text-red-500 hover:text-red-700 text-xs font-bold border border-red-200 bg-red-50 px-2 py-1 rounded">
                            Remove
                        </button>
                    </div>
                </div>
            `;
        }).join('');

        if (cart.length === 0) {
            cartItemsContainer.innerHTML = '<p class="text-gray-500 text-center mt-10">Your cart is empty.</p>';
        }

        cartTotalDisplay.textContent = total.toLocaleString() + ' XAF';
    }

    // Initial render to show saved items
    updateCartUI();


   fetch('fetchUser.php')
    .then(response => response.json())
    .then(data => {
         const productListLink = document.getElementById('productlisting');

         const sidebarDashboardLink = document.getElementById('sidebarDashboardLink');
         const dashboardLink = document.getElementById('dashboards');
         if (data.role && data.role.toLowerCase() === 'buyer') {
            dashboardLink.href = "buyer_dashboard.html";
        }
        if(data.role && data.role.toLowerCase() === 'input supplier') {
            dashboardLink.href = "inputsupplier_dashboard.html";
        }

        if(data.role && data.role.toLowerCase() === 'logistics provider') {
            dashboardLink.href = "logistics_dashboard.html";
        }
        // if(data.role && data.role.toLowerCase() === 'admin') {
        //     dashboardLink.href = "admin_dashboard.html";
        // }
        // if(data.role && data.role.toLowerCase() === 'cooperative') {
        //     dashboardLink.href = "cooperative_dashboard.html";
        // }
        if(data.role && data.role.toLowerCase() === 'farmer') {
            dashboardLink.href = "farmerdashboard.html";
            sidebarDashboardLink.href = "farmerdashboard.html";
        }


        if(data.role === "farmer"){
           
            productListLink.href = "productListing.html";
            
        }
        if (data.role && data.role.toLowerCase() === 'input supplier') {
            productListLink.href = "inputListing.html";
        }

       
        
        if (data.username) {
            const nav = document.querySelector('header .flex.gap-3');
            nav.innerHTML = `
                <span class="text-gray-600">Hello, ${data.username}</span>
                <a href="farmerdashboard.html" class="px-4 py-2 border border-primary text-primary rounded">Dashboard</a>
                <a href="logout.php" class="px-4 py-2 border border-primary text-primary rounded">Logout</a>
            `;
        }
    })
    .catch(error => console.error('Error fetching user data:', error));
</script>

</body>
</html>
