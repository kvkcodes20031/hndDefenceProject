<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Cooperative | FarmGlobe</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1f7a4d',
            secondary: '#2ea36b',
            accent: '#f97316',
            light: '#f6f3ec'
          }
        }
      }
    }
  </script>
</head>
<body class="bg-light min-h-screen flex flex-col items-center justify-center py-10 px-4">
  <!-- Top Left Coop Name Display -->
  <div id="topLeftCoop" class="fixed top-6 left-6 hidden flex items-center gap-2">
    <div class="w-8 h-8 bg-primary rounded flex items-center justify-center text-white font-bold text-xs">CO</div>
    <span id="navCoopName" class="font-bold text-primary text-lg"></span>
  </div>

  <div class="bg-white shadow-lg rounded-lg w-full max-w-2xl p-8">
    <div class="text-center mb-6">
      <h1 class="text-3xl font-bold text-primary mb-2">Create Cooperative</h1>
      <p class="text-gray-500 text-md">Set up your farmer cooperative to start collaborating.</p>
    </div>

    <!-- Cooperative Display Section -->
    <div id="cooperativeDisplay" class="hidden bg-green-50 border border-green-200 text-green-800 p-4 rounded-lg mb-6">
      <h2 class="text-xl font-bold mb-2">Your Cooperative: <span id="coopNameDisplay" class="text-primary"></span></h2>
      <p class="text-sm font-bold">Region: <span id="coopRegionDisplay" class="text-secondary"></span></p>
      <p id="coopDescDisplay" class="text-sm text-gray-600 italic mb-4"></p>
      <p class="text-xs font-bold uppercase tracking-wider text-gray-400 mb-2">Management Actions</p>
      <div class="mt-4 flex gap-4">
        <a href="coperativ.html" class="bg-primary text-white px-4 py-2 rounded-lg font-bold hover:bg-secondary transition shadow-md">
          Cooperative Dashboard
        </a>
        <button onclick="window.location.href='add_member.html'" class="bg-accent text-white px-4 py-2 rounded-lg font-bold hover:bg-orange-600 transition shadow-md">
          Add Member
        </button>
      </div>
    </div>

    <!-- Create Cooperative Form Section -->
    <form id="createCooperativeForm" class="space-y-6">
      <div>
        <label for="coop_name" class="block text-sm font-medium text-gray-700 mb-1">Cooperative Name</label>
        <input type="text" id="coop_name" name="coop_name" required
               class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary bg-gray-50"
               placeholder="e.g., Green Harvest Cooperative">
      </div>
      <div>
        <label for="region" class="block text-sm font-medium text-gray-700 mb-1">Region</label>
        <input type="text" id="region" name="region" required
               class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary bg-gray-50"
               placeholder="e.g., West Region">
      </div>
      <div>
        <label for="coop_description" class="block text-sm font-medium text-gray-700 mb-1">Description (Optional)</label>
        <textarea id="coop_description" name="coop_description" rows="3"
               class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary bg-gray-50"
               placeholder="Briefly describe the mission of your cooperative..."></textarea>
      </div>
      <button type="submit" id="submitBtn" class="w-full bg-primary text-white py-3 rounded-xl hover:bg-secondary transition font-bold shadow-md">
        Create Cooperative
      </button>
    </form>

    <div id="loadingMessage" class="text-center text-gray-500 mt-4 hidden">Loading...</div>
    <div id="errorMessage" class="text-center text-red-500 mt-4 hidden"></div>
  </div>

  <script>
    const cooperativeDisplay = document.getElementById('cooperativeDisplay');
    const coopNameDisplay = document.getElementById('coopNameDisplay');
    const coopDescDisplay = document.getElementById('coopDescDisplay');
    const coopRegionDisplay = document.getElementById('coopRegionDisplay');
    const navCoopName = document.getElementById('navCoopName');
    const topLeftCoop = document.getElementById('topLeftCoop');
    const createCooperativeForm = document.getElementById('createCooperativeForm');
    const submitBtn = document.getElementById('submitBtn');
    const loadingMessage = document.getElementById('loadingMessage');
    const errorMessage = document.getElementById('errorMessage');

    async function fetchUserCooperative() {
      loadingMessage.classList.remove('hidden');
      errorMessage.classList.add('hidden');
      try {
        const response = await fetch('get_user_cooperative.php');
        const data = await response.json();

        if (data.success && data.cooperative) {
          coopNameDisplay.textContent = data.cooperative.name;
          coopRegionDisplay.textContent = data.cooperative.region;
          coopDescDisplay.textContent = data.cooperative.description || "No description provided.";
          navCoopName.textContent = data.cooperative.name;
          topLeftCoop.classList.remove('hidden');
          cooperativeDisplay.classList.remove('hidden');
          createCooperativeForm.classList.add('hidden');
        } else {
          createCooperativeForm.classList.remove('hidden');
        }
      } catch (error) {
        console.error('Error fetching cooperative:', error);
        errorMessage.textContent = 'Failed to load cooperative information.';
        errorMessage.classList.remove('hidden');
        createCooperativeForm.classList.remove('hidden'); // Show form even on error
      } finally {
        loadingMessage.classList.add('hidden');
      }
    }

    createCooperativeForm.addEventListener('submit', async function(e) {
      e.preventDefault();
      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating...';
      errorMessage.classList.add('hidden');

      try {
        const formData = new FormData(this);
        const response = await fetch('create_cooperative.php', { method: 'POST', body: formData });
        const data = await response.json();

        if (data.success) {
          alert('Cooperative created successfully!');
          window.location.href = 'coperativ.html';
        } else {
          errorMessage.textContent = data.errors.join('\n');
          errorMessage.classList.remove('hidden');
        }
      } catch (error) {
        console.error('Error creating cooperative:', error);
        errorMessage.textContent = 'Failed to create cooperative.';
        errorMessage.classList.remove('hidden');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create Cooperative';
      }
    });

    document.addEventListener('DOMContentLoaded', fetchUserCooperative);
  </script>
</body>
</html>
