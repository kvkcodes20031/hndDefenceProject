<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Complete Profile | AgriLink</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1f7a4d',
            secondary: '#2ea36b',
            light: '#f6f3ec'
          }
        }
      }
    }
  </script>
</head>
<body class="bg-light min-h-screen flex items-center justify-center py-10 px-4">

  <div class="bg-white shadow-lg rounded-lg w-full max-w-lg p-8">
    <div class="text-center mb-6">
      <h1 class="text-2xl font-bold text-primary">Complete Your Profile</h1>
      <p class="text-gray-500 text-sm">Tell us a bit more about yourself</p>
    </div>

    <form id="profileForm" enctype="multipart/form-data" class="space-y-4">
      
      <div>
        <label class="block text-sm font-medium mb-1">Current Location</label>
        <input type="text" name="location" placeholder="e.g. Bamenda, North West" required class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-primary">
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">Date of Birth</label>
        <input type="date" name="date_of_birth" required class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-primary">
      </div>
      
      <div>
        <label class="block text-sm font-medium mb-1">Gender</label>
        <select name="gender" required class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-primary">
          <option value="">Select Gender</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">Profile Type (Optional)</label>
        <input type="text" name="profile_type" placeholder="e.g. Individual" class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-primary">
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">Rating (Optional)</label>
        <input type="number" name="rating" placeholder="0.0" step="0.1" class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-primary">
      </div>
      
      <div>
        <label class="block text-sm font-medium mb-1">Profile Photo</label>
        <input type="file" name="profile_photo" class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-primary bg-gray-50">
      </div>

      <button type="submit" class="w-full bg-primary text-white py-3 rounded hover:bg-secondary transition mt-4">Save Profile</button>
    </form>
  </div>

  <script src="profile.js"></script>

</body>
</html>
