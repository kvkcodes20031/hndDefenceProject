<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - AgriLink</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                primary: '#1f7a4d',
                secondary: '#2ea36b',
                light: '#f6f3ec'
              }
            }
          }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-light min-h-screen flex items-center justify-center py-10 px-4">

    <div class="bg-white shadow-xl rounded-2xl w-full max-w-3xl overflow-hidden">
        
        <!-- Header -->
        <div class="bg-primary px-8 py-6 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold text-white">Edit Profile</h1>
                <p class="text-green-100 text-sm">Update your personal and farm information</p>
            </div>
            <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center text-white font-bold">
                GN
            </div>
        </div>

        <form class="p-8 space-y-8" action="userProfile.html" enctype="multipart/form-data">
            
            <!-- Section: Profile Photo -->
            <div>
                <h3 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">Profile Photo</h3>
                <div class="flex items-center gap-6">
                    <div class="w-20 h-20 bg-gray-200 rounded-full overflow-hidden border-2 border-gray-300">
                        <img src="https://via.placeholder.com/80" alt="Current Profile" class="w-full h-full object-cover">
                    </div>
                    <div class="flex-1">
                        <label class="block text-sm font-bold text-gray-700 mb-2">Upload New Photo</label>
                        <input type="file" accept="image/*" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition bg-gray-50 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-green-50 file:text-primary hover:file:bg-green-100">
                        <p class="text-xs text-gray-500 mt-1">JPG, PNG or GIF. Max size 2MB.</p>
                    </div>
                </div>
            </div>

            <!-- Section: Personal Info -->
            <div>
                <h3 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">Personal Information</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Full Name</label>
                        <input type="text" value="Gaston Ngwa" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Role / Title</label>
                        <input type="text" value="Rice Farmer" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Phone Number</label>
                        <input type="tel" value="+237 678 123 456" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Email Address</label>
                        <input type="email" value="g.ngwa@email.com" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition bg-gray-50">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-bold text-gray-700 mb-2">Location</label>
                        <input type="text" value="Ndop, Cameroon" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition bg-gray-50">
                    </div>
                </div>
            </div>

            <!-- Section: Farm Details -->
            <div>
                <h3 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">Farm Details</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Farm Size</label>
                        <input type="text" value="5 hectares" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Production (kg/year)</label>
                        <input type="text" value="12,000" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Irrigation System</label>
                        <select class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition bg-gray-50">
                            <option selected>Semi-Modern System</option>
                            <option>Manual</option>
                            <option>Fully Automated</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Buttons -->
            <div class="flex items-center gap-4 pt-4">
                <button type="submit" class="flex-1 bg-primary text-white font-bold py-4 rounded-xl hover:bg-secondary transition shadow-lg">
                    Save Changes
                </button>
                <a href="userProfile.html" class="px-8 py-4 rounded-xl font-bold text-gray-600 hover:bg-gray-100 transition border border-gray-200">
                    Cancel
                </a>
            </div>

        </form>
    </div>

</body>
</html>
