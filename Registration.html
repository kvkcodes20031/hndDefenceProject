<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <form action="userRgistration.php" method="post">
    <label for="">first name</label>
    <input type="text" name="first_name"><br><br>
    <label for="last_name">last name</label>
    <input type="text" name="last_name" id="last_name"><br><br>
    <label for="">phone Number</label>
    <input type="tel" name="phone_number"><br><br>
    <label for="">email</label>
    <input type="text" name="email" id=""><br><br>
    <label for="">password</label>
    <input type="password_hash" name="password_hash" id=""><br><br>
    
    <input type="password_hash" name="confirm_password" id=""><br>
    <label for="">Role</label>
    <input type="text" name="role" list="roles" Id="role">
    <datalist id="roles">
      
      <option value="Farmer" ></option>
      <option value="Buyer"></option>
      <option value="Admin"></option>
      <option value="input supplyer"></option>
      <option value="logistic operator"></option>
    </datalist><br><br>
    <button type="submit">submit</button>
  </form>


  <script>
    const form = document.getElementById('registerForm');
const responseDiv = document.getElementById('response');

form.addEventListener('submit', async (e) => {
    e.preventDefault(); // Prevent page reload

    const formData = new FormData(form);

    try {
        const res = await fetch('register.php', {  // Replace with your PHP file path
            method: 'POST',
            body: formData
        });

        const data = await res.json();

        if (data.success === false) {
            // Display all errors
            responseDiv.innerHTML = data.errors.join('<br>');
        } else {
            responseDiv.innerHTML = 'Registration successful!';
        }

    } catch (err) {
        responseDiv.innerHTML = 'An error occurred: ' + err.message;
    }
});

  </script>
    
</body>
</html>
