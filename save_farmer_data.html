<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Farmer Details | AgriLink</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1f7a4d',
            secondary: '#2ea36b',
            light: '#f6f3ec'
          }
        }
      }
    }
  </script>
</head>
<body class="bg-light min-h-screen flex items-center justify-center py-10 px-4">
  <div class="bg-white shadow-lg rounded-lg w-full max-w-md p-8">
    <div class="text-center mb-6">
      <h1 class="text-2xl font-bold text-primary">Farmer Details</h1>
      <p class="text-gray-500 text-sm">Tell us about your farm</p>
    </div>
    <form id="farmerForm" class="space-y-4">
      <div>
        <label class="block text-sm font-medium mb-1">Farm Name</label>
        <input type="text" name="farm_name" placeholder="e.g. Green Valley Farm" required class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-primary">
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Farming Type</label>
        <input type="text" name="farming_type" placeholder="e.g. Crop Farming, Livestock" required class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-primary">
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Years of Experience</label>
        <input type="number" name="experienced_year" placeholder="e.g. 5" required class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-primary">
      </div>
      <button type="submit" class="w-full bg-primary text-white py-3 rounded hover:bg-secondary transition mt-4">Save Details</button>
    </form>
  </div>
  <script>
    document.getElementById('farmerForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const btn = this.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.textContent = 'Saving...';

      fetch('save_famer_data.php', { method: 'POST', body: new FormData(this) })
      .then(r => r.json())
      .then(d => {
        if(d.success) {
          document.location.href = 'farmerdashboard.html';
          btn.disabled = false;
          btn.textContent = 'Save Details';
        } else {
          alert(d.errors.join('\n'));
          btn.disabled = false;
          btn.textContent = 'Save Details';
        }
      })
      .catch(e => {
        console.error(e);
        btn.disabled = false;
        btn.textContent = 'Save Details';
      });
    });
  </script>
</body>
</html>
